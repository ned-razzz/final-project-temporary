services:
  business_service:
    build:
      context: ./server/business_service
    container_name: business_service
    ports:
      - "9001:9001"
    environment:
      BUSINESS_SERVICE_PORT: "9001"
      BUSINESS_SERVICE_DB_HOST: business_db
      BUSINESS_SERVICE_DB_PORT: "3306"
      BUSINESS_SERVICE_CONTROL_SERVICE_HOST: control_service
      BUSINESS_SERVICE_CONTROL_SERVICE_PORT: "9002"
      BUSINESS_SERVICE_WEB_SERVICE_HOST: web_service
      BUSINESS_SERVICE_WEB_SERVICE_TCP_PORT: "9004"
    depends_on:
      business_db:
        condition: service_healthy

  control_service:
    build:
      context: ./server/control_service
    container_name: control_service
    ports:
      - "9002:9002"
    environment:
      CONTROL_SERVICE_PORT: "9002"
      CONTROL_SERVICE_BUSINESS_SERVICE_HOST: business_service
      CONTROL_SERVICE_BUSINESS_SERVICE_PORT: "9001"
      CONTROL_SERVICE_VISION_SERVICE_HOST: vision_service
      CONTROL_SERVICE_VISION_SERVICE_TCP_PORT: "9003"
      CONTROL_SERVICE_ROS_DOMAIN_ID: "0"

  vision_service:
    build:
      context: ./server/vision_service
    container_name: vision_service
    ports:
      - "9003:9003"
      - "9103:9103/udp"
    environment:
      VISION_SERVICE_TCP_PORT: "9003"
      VISION_SERVICE_UDP_PORT: "9103"
      VISION_SERVICE_CONTROL_SERVICE_HOST: control_service
      VISION_SERVICE_CONTROL_SERVICE_PORT: "9002"

  web_service:
    build:
      context: ./server/web_service
    container_name: web_service
    ports:
      - "8000:8000"
      - "9004:9004"
    environment:
      WEB_SERVICE_HTTP_PORT: "8000"
      WEB_SERVICE_TCP_PORT: "9004"
      WEB_SERVICE_BUSINESS_SERVICE_HOST: business_service
      WEB_SERVICE_BUSINESS_SERVICE_PORT: "9001"

  business_db:
    image: mysql:8.4
    container_name: business_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: business
      MYSQL_USER: business_user
      MYSQL_PASSWORD: business_password
    volumes:
      - business_db_data:/var/lib/mysql
      - ./server/business_db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  business_db_data:
